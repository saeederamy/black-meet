<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Meet</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;}
        #login-screen, #meet-screen { width: 100%; max-width: 1000px; text-align: center; }
        #meet-screen { display: none; }
        .video-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        video { width: 300px; height: 200px; background: #000; border-radius: 8px; object-fit: cover; }
        .controls { margin-top: 15px; background: #222; padding: 10px; border-radius: 8px;}
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; background: #333; color: white;}
        button:hover { background: #555; }
        .admin-btn { background: #d32f2f; }
        .screen-btn { background: #1976d2; }
        .chat-box { margin-top: 20px; width: 100%; max-width: 500px; background: #222; border-radius: 8px; padding: 10px; text-align: right;}
        #chat-messages { height: 150px; overflow-y: auto; border-bottom: 1px solid #444; margin-bottom: 10px; padding: 5px;}
        input[type="text"], input[type="password"] { padding: 10px; margin: 5px; border-radius: 4px; border: none; width: 200px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>ورود به Black Meet</h2>
        <input type="text" id="username" placeholder="نام کاربری"><br>
        <input type="password" id="password" placeholder="رمز عبور (admin/user)"><br>
        <button onclick="login()">ورود به جلسه</button>
    </div>

    <div id="meet-screen">
        <h2>جلسه تصویری</h2>
        <div class="video-grid" id="video-grid">
            <div>
                <video id="local-video" autoplay muted playsinline></video>
                <p>شما (<span id="role-display"></span>)</p>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="toggleAudio()">🎤 قطع/وصل صدا</button>
            <button onclick="toggleVideo()">📷 قطع/وصل تصویر</button>
            <button class="screen-btn" onclick="toggleScreenShare()">💻 شیر اسکرین</button>
            
            <span id="admin-controls" style="display: none; border-right: 2px solid #555; padding-right: 10px; margin-right: 10px;">
                <button class="admin-btn" onclick="endCall()">🛑 پایان کنفرانس</button>
            </span>
        </div>

        <div class="chat-box">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="پیام خود را بنویسید...">
            <button onclick="sendChat()">ارسال</button>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
