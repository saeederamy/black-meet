<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Meet</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* --- متغیرها و تنظیمات پایه --- */
        :root {
            --primary-blue: #3b82f6;
            --primary-hover: #2563eb;
            --dark-bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger-red: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--dark-bg);
            /* یک پس‌زمینه با هاله های رنگی برای جلوه شیشه‌ای */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- کلاس پایه شیشه‌ای (Glassmorphism) --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* --- صفحه لاگین --- */
        #login-screen {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #login-screen h2 {
            font-size: 28px;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#fff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group span {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover { background: var(--primary-hover); }

        /* --- صفحه کنفرانس --- */
        #meet-screen {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
        }

        /* بخش اصلی شامل ویدیوها و چت */
        .main-workspace {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 100px); /* فضای نوار پایین را کم می‌کنیم */
        }

        /* گرید ویدیوها */
        #video-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            align-content: center;
        }

        /* استایل کانتینر ویدیوها (شامل ویدیوهای اضافه شده توسط جاوااسکریپت) */
        #video-grid > div {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #video-grid video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        /* پنل کناری (چت) */
        .sidebar {
            flex: 1;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-radius: 24px;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
            font-size: 14px;
        }

        #chat-messages p { margin-bottom: 10px; line-height: 1.5; }
        #chat-messages b { color: var(--primary-blue); }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            padding: 12px;
            margin: 0;
            border-radius: 20px;
        }

        .chat-input-area button {
            background: var(--primary-blue);
            border: none;
            color: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* نوار کنترل پایین (Bottom Bar) مشابه گوگل میت */
        .bottom-bar {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .control-btn.active { background: var(--primary-blue); border-color: var(--primary-blue);}
        .control-btn.danger { background: var(--danger-red); border-color: var(--danger-red);}
        .control-btn.danger:hover { background: #b91c1c; }
        
        .admin-section {
            display: none;
            border-right: 1px solid var(--glass-border);
            padding-right: 15px;
            margin-right: 5px;
            gap: 15px;
        }

        /* استایل اسکرول بار اختصاصی */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

    </style>
</head>
<body>

    <div id="login-screen" class="glass-panel">
        <h2>Black Meet</h2>
        <p style="color: #94a3b8; font-size: 14px;">لطفاً اطلاعات خود را وارد کنید</p>
        
        <div class="input-group">
            <span class="material-icons">person</span>
            <input type="text" id="username" placeholder="نام کاربری">
        </div>
        
        <div class="input-group">
            <span class="material-icons">lock</span>
            <input type="password" id="password" placeholder="رمز عبور">
        </div>
        
        <button class="btn-primary" onclick="login()">ورود به جلسه</button>
    </div>

    <div id="meet-screen">
        
        <div class="main-workspace">
            <div id="video-grid">
                <div>
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="video-label">شما (<span id="role-display"></span>)</div>
                </div>
            </div>

            <div class="sidebar glass-panel">
                <div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; display: flex; align-items: center; gap: 8px;">
                    <span class="material-icons" style="color: var(--primary-blue);">chat</span>
                    گفتگوی جلسه
                </div>
                
                <div id="chat-messages"></div>
                
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="پیام شما...">
                    <button onclick="sendChat()">
                        <span class="material-icons">send</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="bottom-bar">
            <button class="control-btn" id="btn-mic" onclick="toggleAudio()" title="میکروفون">
                <span class="material-icons">mic</span>
            </button>
            <button class="control-btn" id="btn-cam" onclick="toggleVideo()" title="دوربین">
                <span class="material-icons">videocam</span>
            </button>
            <button class="control-btn" onclick="toggleScreenShare()" title="اشتراک صفحه">
                <span class="material-icons">present_to_all</span>
            </button>
            
            <div class="admin-section" id="admin-controls">
                <button class="control-btn danger" onclick="endCall()" title="پایان جلسه برای همه">
                    <span class="material-icons">call_end</span>
                </button>
            </div>
        </div>

    </div>

    <script src="/static/script.js"></script>
</body>
</html>
