<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Meet - Enterprise</title>
    <style>
        :root {
            --c-black: #050505; --c-dark: #0a0a0c; --c-white: #ffffff;
            --c-blue: #3b82f6; --c-red: #ef4444; --c-orange: #f97316; --c-green: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--c-black); color: var(--c-white);
            background-image: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08), transparent 40%);
            height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; }

        #login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10;}
        #login-screen { width: 100%; max-width: 400px; padding: 45px 35px; text-align: center; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #login-screen h2 { font-size: 32px; letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
        #login-screen h2 span { color: var(--c-blue); text-shadow: 0 0 15px rgba(59,130,246,0.4);}
        input { width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--glass-border); border-radius: 12px; color: white; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--c-blue); background: rgba(0,0,0,0.9); box-shadow: 0 0 15px rgba(59,130,246,0.2);}
        .btn-primary { background: var(--c-white); color: var(--c-black); border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: var(--c-blue); color: var(--c-white); transform: translateY(-2px);}

        /* --- Room Selection Lobby --- */
        #rooms-wrapper { display: none; flex: 1; align-items: center; justify-content: center; padding: 20px; z-index: 10;}
        .rooms-container { width: 100%; max-width: 800px; padding: 40px; display: flex; flex-direction: column; gap: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); max-height: 90vh;}
        .rooms-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;}
        .rooms-header h2 { font-size: 24px; }
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; overflow-y: auto; padding-right: 10px;}
        
        .room-card { background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; cursor: pointer; position: relative;}
        .room-card:hover { border-color: var(--c-orange); transform: translateY(-3px); box-shadow: 0 5px 20px rgba(249,115,22,0.15);}
        .room-card h3 { font-size: 18px; color: var(--c-white); margin-right: 30px;}
        .room-card .join-btn { background: rgba(255,255,255,0.1); color: white; border:none; padding: 10px; border-radius: 8px; font-weight:bold; transition: 0.2s;}
        .room-card:hover .join-btn { background: var(--c-orange); color: #000;}
        
        .room-admin-tools { position: absolute; top: 15px; right: 15px; display: none; z-index: 10;}
        .is-admin .room-admin-tools { display: block; }
        .r-menu-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; padding: 5px;}
        .r-menu-btn:hover { color: var(--c-white); }
        .r-dropdown { position: absolute; top: 30px; right: 0; background: var(--c-dark); border: 1px solid var(--glass-border); border-radius: 8px; padding: 5px; display: none; flex-direction: column; min-width: 140px; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.9);}
        .r-dropdown.show { display: flex; }
        .r-dropdown button { background: transparent; border: none; color: var(--c-white); padding: 8px; text-align: left; cursor: pointer; border-radius: 4px; font-size: 13px;}
        .r-dropdown button:hover { background: rgba(255,255,255,0.1); color: var(--c-blue);}

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);}
        .modal-box { background: var(--c-dark); border: 1px solid var(--glass-border); border-radius: 16px; padding: 30px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .modal-box h3 { border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; margin-bottom: 10px;}
        .user-checkbox-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px;}
        .user-checkbox-list label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 14px;}
        .modal-actions { display: flex; gap: 10px; margin-top: 10px;}
        .modal-actions button { flex: 1; padding: 12px; border:none; border-radius: 8px; font-weight: bold; cursor: pointer;}
        .modal-actions .cancel { background: rgba(255,255,255,0.1); color: white;}

        #meeting-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(5,5,5,0.98); backdrop-filter: blur(20px); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #meeting-overlay h1 { color: var(--c-white); font-size: 28px; margin-bottom: 10px;}
        #meeting-overlay p { color: var(--text-muted); font-size: 16px;}

        #meet-screen { display: none; flex-direction: column; height: 100%; width: 100%; position: relative;}
        
        .top-tabs { display: flex; gap: 15px; padding: 15px 25px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--glass-border); align-items: center; z-index: 10;}
        .tab-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 14px; }
        .tab-btn:hover { color: var(--c-white); background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: var(--glass-bg); border-color: var(--glass-border); color: var(--c-white); box-shadow: 0 0 15px rgba(255,255,255,0.1);}

        .workspace { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; position: relative;}

        #video-grid { flex: 1; display: grid; gap: 15px; width: 100%; height: 100%; transition: all 0.3s; padding-right: 5px; overflow-y: auto; }
        #video-grid.grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        #video-grid.grid-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        #video-grid.grid-3, #video-grid.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        #video-grid.grid-5, #video-grid.grid-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
        #video-grid.grid-many { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); grid-auto-rows: minmax(200px, 1fr);}

        .video-container { position: relative; background: var(--c-dark); border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); width: 100%; height: 100%; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        .video-container[data-type="camera"] video { object-fit: cover; }
        .video-container[data-type="screen"] video { object-fit: contain; }
        
        #local-video { transform: scaleX(-1); }
        video { width: 100%; height: 100%; background: #000; transition: opacity 0.3s;}
        
        .label { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); padding: 6px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); color: var(--c-white); pointer-events: none; transition: 0.3s; }
        .mic-indicator { color: #555; display: flex; align-items: center; transition: 0.2s; }
        .mic-indicator.speaking { color: var(--c-green); transform: scale(1.2); text-shadow: 0 0 10px rgba(16,185,129,0.8); }
        .mic-indicator svg { width: 16px; height: 16px; fill: currentColor; }

        .avatar-bubble { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; flex-direction: column; background: #111; }
        .avatar-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--c-dark); border: 2px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: var(--c-white); margin-bottom: 15px; }
        .avatar-name { font-size: 16px; color: var(--text-muted); font-weight: 600;}
        .cam-off video { opacity: 0; }
        .cam-off .avatar-bubble { display: flex; }

        .menu-wrapper { position: absolute; top: 15px; right: 15px; z-index: 20; transition: opacity 0.3s;}
        .three-dots-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: var(--c-white); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .three-dots-btn:hover { background: var(--c-white); color: var(--c-black);}
        .dropdown-menu { position: absolute; top: 45px; right: 0; background: rgba(15,15,18,0.95); border: 1px solid var(--glass-border); border-radius: 12px; padding: 8px; min-width: 140px; display: none; flex-direction: column; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { background: transparent; border: none; color: var(--c-white); padding: 8px 12px; text-align: left; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .dropdown-item:hover { background: rgba(255,255,255,0.1); color: var(--c-blue);}

        .video-container.pinned { grid-column: 1 / -1; grid-row: 1 / span 2; height: 65vh; border-color: var(--c-blue); box-shadow: 0 0 30px rgba(59,130,246,0.2);}
        .video-container.pinned video { object-fit: contain; } 
        
        .video-container.fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9000; border-radius: 0; border: none; background: #000;}
        .video-container.fullscreen video { object-fit: contain; }
        .video-container.fullscreen .menu-wrapper, .video-container.fullscreen .label { opacity: 0; pointer-events: none; transition: opacity 0.4s;}
        .video-container.fullscreen:hover .menu-wrapper, .video-container.fullscreen:hover .label { opacity: 1; pointer-events: auto; }
        
        .video-container.pip { position: fixed; bottom: 30px; right: 30px; width: 220px; height: 125px; z-index: 10000; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.9); border: 2px solid var(--c-blue); }

        /* --- Sidebar --- */
        .sidebar { width: 360px; display: none; flex-direction: column; background: rgba(5,5,5,0.9);}
        .sidebar.show { display: flex; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;}
        .sidebar-tabs { display: flex; gap: 5px; flex: 1; margin-right: 15px;}
        .sb-tab { background: transparent; border: none; color: var(--text-muted); font-size: 14px; font-weight: bold; cursor: pointer; padding: 8px 12px; border-radius: 8px;}
        .sb-tab.active { background: rgba(255,255,255,0.1); color: var(--c-blue); }
        .close-sidebar { background: none; border: none; cursor: pointer; font-size: 26px; color: var(--text-muted); }
        .close-sidebar:hover { color: var(--c-white); }

        .sb-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .sb-panel.active { display: flex; }

        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px;}
        .chat-msg { margin-bottom: 15px; line-height: 1.5; color: #ddd; background: rgba(255,255,255,0.05); padding: 12px 15px; border-radius: 12px; border-left: 3px solid var(--glass-border);}
        .chat-msg.me { border-left: none; border-right: 3px solid var(--c-blue); text-align: right;}
        .chat-msg b { color: var(--text-muted); display: block; margin-bottom: 5px; font-size: 12px;}
        .chat-msg.me b { color: var(--c-blue); }
        .chat-input { display: flex; gap: 10px; padding: 15px; border-top: 1px solid var(--glass-border); }
        .chat-input input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--c-white); outline:none;}
        .chat-input button { background: var(--c-white); color: var(--c-black); border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; cursor: pointer; }

        #users-list { padding: 15px; overflow-y: auto; flex: 1;}
        .user-row { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid var(--glass-border);}
        .user-row .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--c-blue); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;}
        .user-row .name { font-size: 15px; font-weight: bold;}

        #admin-panel { padding: 15px; overflow-y: auto; flex: 1;}
        .rec-item { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; margin-bottom: 15px;}
        .rec-title { font-weight: bold; font-size: 14px; margin-bottom: 10px; display:flex; align-items:center; gap: 8px;}
        .rec-title::before { content: '🔴'; }
        .rec-actions { display: flex; gap: 10px; }
        .rec-btn { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;}
        .btn-dl { background: var(--c-blue); color: white;}
        .btn-del { background: var(--c-red); color: white;}

        .bottom-bar { height: 90px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 15px; background: rgba(3, 3, 3, 0.95); border-top: 1px solid var(--glass-border); z-index: 150;}
        .ctrl-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--c-white); width: 54px; height: 54px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.08); }
        .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .ctrl-btn.active-blue { background: var(--c-blue); border-color: var(--c-blue); color: #fff;}
        .ctrl-btn.active-red { background: var(--c-red); border-color: var(--c-red); color: #fff;}
        
        .record-pulse { animation: pulse 1.5s infinite; background: var(--c-red) !important; border-color: var(--c-red) !important;}
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        @media (max-width: 768px) {
            .workspace { padding: 10px; }
            #video-grid.grid-2 { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            #video-grid.grid-3, #video-grid.grid-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;}
            .top-tabs { padding: 10px; justify-content: center; overflow-x: auto;}
            .sidebar { position: fixed; top: 0; left: 0; width: 100vw; height: calc(100dvh - 90px); z-index: 200; }
            .video-container.pip { width: 100px; height: 130px; bottom: 100px; right: 10px; }
            .video-container.pinned { height: 40vh; }
            .video-container.fullscreen { height: calc(100dvh - 90px); }
        }
    </style>
</head>
<body>

    <div id="login-wrapper">
        <div id="login-screen" class="glass-panel">
            <h2>Black <span>Meet</span></h2>
            <input type="text" id="username" placeholder="Username" autocomplete="off" autocapitalize="none">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-primary" onclick="login()">Sign In</button>
        </div>
    </div>

    <div id="rooms-wrapper">
        <div class="rooms-container glass-panel">
            <div class="rooms-header">
                <h2>Select a <span>Room</span></h2>
                <button class="btn-primary" id="btn-create-room" style="display: none; padding: 10px 15px; font-size:14px; background:var(--c-blue);" onclick="openCreateRoom()">+ Create Room</button>
            </div>
            <div id="rooms-list" class="rooms-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="room-modal">
        <div class="modal-box">
            <h3 id="modal-title">Create Room</h3>
            <input type="text" id="room-name-input" placeholder="Room Name (e.g. Daily Standup)">
            <input type="hidden" id="edit-room-id">
            <div class="modal-actions">
                <button class="cancel" onclick="closeModal('room-modal')">Cancel</button>
                <button class="btn-primary" onclick="saveRoom()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="members-modal">
        <div class="modal-box">
            <h3>Manage Users</h3>
            <p style="font-size: 13px; color: var(--text-muted);">Select users allowed to join this room:</p>
            <div class="user-checkbox-list" id="users-checkboxes"></div>
            <input type="hidden" id="members-room-id">
            <div class="modal-actions">
                <button class="cancel" onclick="closeModal('members-modal')">Cancel</button>
                <button class="btn-primary" onclick="saveMembers()">Save Users</button>
            </div>
        </div>
    </div>

    <div id="meeting-overlay">
        <h1>Meeting Paused</h1>
        <p>The host has temporarily paused the session. Please wait...</p>
    </div>

    <div id="meet-screen">
        <div class="top-tabs" id="view-tabs">
            <span style="margin-right:auto; font-weight:bold; color:var(--c-blue);" id="current-room-name">Room Name</span>
            <button class="tab-btn active" onclick="filterView('all', this)">All Feeds</button>
            <button class="tab-btn" onclick="filterView('camera', this)">Cameras Only</button>
            <button class="tab-btn" onclick="filterView('screen', this)">Screens Only</button>
            <button class="tab-btn" style="color:var(--c-red); border:1px solid rgba(255,0,0,0.3);" onclick="leaveRoom()">Exit Room</button>
        </div>

        <div class="workspace" id="main-workspace">
            <div id="video-grid" class="grid-1">
                
                <div class="video-container" id="local-container" data-type="camera" title="Double click to expand">
                    <div class="avatar-bubble">
                        <div class="avatar-circle" id="local-avatar">U</div>
                        <div class="avatar-name">Camera Off</div>
                    </div>
                    <div class="menu-wrapper">
                        <button class="three-dots-btn" onclick="toggleMenu('local-menu')">⋮</button>
                        <div class="dropdown-menu" id="local-menu">
                            <button class="dropdown-item" onclick="togglePin('local-container'); toggleMenu('local-menu')">📌 Pin Video</button>
                            <button class="dropdown-item" onclick="makeFullscreen('local-container'); toggleMenu('local-menu')">🔲 Fullscreen</button>
                        </div>
                    </div>
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="label">
                        <span class="mic-indicator" id="mic-local"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></span>
                        You (<span id="role-display"></span>)
                    </div>
                </div>

            </div>

            <div class="sidebar glass-panel" id="main-sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-tabs">
                        <button class="sb-tab active" onclick="switchSidebarTab('chat')">Chat</button>
                        <button class="sb-tab" onclick="switchSidebarTab('users')">Users</button>
                        <button class="sb-tab" id="admin-tab-btn" style="display:none;" onclick="switchSidebarTab('admin')">Admin</button>
                    </div>
                    <button class="close-sidebar" onclick="toggleSidebar()">×</button>
                </div>
                
                <div class="sb-panel active" id="panel-chat">
                    <div id="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="Type a message...">
                        <button onclick="sendChat()">Send</button>
                    </div>
                </div>

                <div class="sb-panel" id="panel-users">
                    <div id="users-list"></div>
                </div>

                <div class="sb-panel" id="panel-admin">
                    <div style="padding: 15px; border-bottom: 1px solid var(--glass-border);">
                        <button class="btn-primary" style="width: 100%; font-size:14px; background:var(--c-orange); margin-bottom:10px;" id="btn-sys-update" onclick="checkUpdate()">🔄 Check & Update System</button>
                        <button class="btn-primary" style="width: 100%; font-size:14px;" onclick="clearChat()">🗑️ Clear Room Chat</button>
                        <button class="btn-primary" style="width: 100%; font-size:14px; background:var(--c-blue); margin-top:10px;" onclick="downloadChat()">📥 Download Chat Log</button>
                    </div>
                    <div style="padding: 15px; font-weight: bold;">Saved Recordings</div>
                    <div id="recordings-list" style="padding: 0 15px; overflow-y: auto;">
                        <p style="color:var(--text-muted); font-size:13px; text-align:center;">No recordings yet.</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-bar">
            <button class="ctrl-btn active-blue" id="btn-mic" onclick="toggleAudio()" title="Toggle Mic"></button>
            <button class="ctrl-btn active-blue" id="btn-cam" onclick="toggleVideo()" title="Toggle Camera"></button>
            <button class="ctrl-btn" onclick="toggleScreenShare()" title="Share Screen" id="btn-share">
                <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM5 15h3v3h8v-3h3l-7-7-7 7z"/></svg>
            </button>
            <button class="ctrl-btn" onclick="toggleSidebar()" title="Sidebar">
                <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            
            <span id="admin-controls" style="display: none; border-left: 1px solid var(--glass-border); padding-left: 15px; margin-left: 5px; gap:10px;">
                <button class="ctrl-btn" id="btn-record" onclick="toggleRecording()" title="Record Meeting">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
                </button>
                <button class="ctrl-btn active-red" id="btn-meeting-state" onclick="toggleMeetingState()" title="End Meeting" style="width: 80px; border-radius: 25px;"></button>
            </span>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
